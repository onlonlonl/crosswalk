<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf5ef; --card: #fefbf6; --border: #8a8078; --accent: #f4845f;
    --cream: #faf0e6; --text: #5a534c; --muted: #a0907e; --light: #e8ddd0;
    --tan: #d4a574; --shadow: #d4c4b0;
    --weather: #6b9bd2; --place: #7bb86f; --time: #d4a03c; --mood: #c76b8a; --custom: #a08cc4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DotGothic16', monospace; font-size: 13px;
    min-height: 100vh; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle, var(--light) 1px, transparent 1px);
    background-size: 16px 16px; opacity: .4; pointer-events: none; z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }

/* Header */
.header { text-align: center; padding: 28px 16px 12px; border-bottom: 2px dashed var(–shadow); }
.header h1 { font-size: 28px; font-weight: 800; color: var(–accent); letter-spacing: 4px; text-transform: uppercase; text-shadow: 2px 2px 0 #fce4d6; }
.gear { position: absolute; top: 16px; right: 16px; cursor: pointer; opacity: .6; transition: opacity .2s; text-align: center; font-size: 8px; color: var(–muted); }
.gear:hover { opacity: 1; }

/* Nav */
.nav { display: flex; justify-content: center; gap: 12px; padding: 20px 16px; flex-wrap: wrap; align-items: center; }
.btn {
padding: 10px 20px; border: 2px solid var(–border); background: var(–cream);
color: #7a7068; cursor: pointer; font-size: 12px; font-family: inherit;
box-shadow: 2px 2px 0 var(–shadow); transition: all .15s;
}
.btn:hover { transform: translateY(-1px); }
.btn.active { background: var(–accent); color: var(–cream); box-shadow: 3px 3px 0 #7a7068; }
.btn.small { padding: 10px 14px; }

/* Columns */
.columns { display: flex; gap: 0; padding: 0 12px 24px; min-height: 60vh; }
.col { flex: 1; padding: 0 8px; }
.col-label { text-align: center; font-size: 11px; letter-spacing: 3px; color: var(–muted); padding: 8px 0 12px; }
.divider { width: 2px; margin: 0 4px; flex-shrink: 0; background: repeating-linear-gradient(to bottom, var(–shadow) 0, var(–shadow) 4px, transparent 4px, transparent 8px); }

/* Cards */
.card {
background: var(–card); border: 2px solid var(–border); margin-bottom: 12px;
padding: 14px; cursor: pointer; box-shadow: 3px 3px 0 var(–light);
transition: all .25s ease;
}
.card:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 var(–shadow); }
.card.expanded { box-shadow: 4px 4px 0 var(–tan); transform: none; }
.card-empty {
background: transparent; border: 2px dashed var(–shadow); margin-bottom: 12px;
padding: 32px 14px; text-align: center; color: #c4b4a0; font-size: 11px;
}
.cover {
width: 100%; aspect-ratio: 1; border: 1px solid var(–light);
display: flex; align-items: center; justify-content: center;
margin-bottom: 10px; position: relative; overflow: hidden;
background: linear-gradient(135deg, #fce4d6, #f4845f22 50%, var(–light));
}
.cover img { width: 100%; height: 100%; object-fit: cover; }
.vinyl { width: 60%; height: 60%; border-radius: 50%; background: radial-gradient(circle, #7a7068 15%, #6a635c 16%, #6a635c 30%, #7a7068 31%); opacity: .15; }
.cover .album-label { position: absolute; bottom: 6px; right: 6px; font-size: 8px; color: var(–muted); background: #faf0e6cc; padding: 2px 4px; }
.song-title { font-size: 14px; font-weight: 700; color: var(–text); margin-bottom: 2px; line-height: 1.3; }
.song-artist { font-size: 11px; color: #8a7a68; margin-bottom: 4px; }
.listen-link { font-size: 9px; color: var(–weather); text-decoration: none; }
.tag { display: inline-block; padding: 3px 8px; font-size: 10px; margin: 0 4px 4px 0; }

/* Expanded card content */
.theme-bar { font-size: 10px; color: var(–muted); margin-top: 10px; padding: 6px 8px; background: #f4f0ea; }
.note { font-size: 12px; line-height: 1.6; color: #7a7068; padding: 10px 0; border-top: 1px dashed var(–light); margin-top: 8px; font-style: italic; }
.comments-section { border-top: 2px dashed var(–light); margin-top: 12px; padding-top: 10px; }
.comments-label { font-size: 10px; color: var(–muted); margin-bottom: 8px; letter-spacing: 1px; }
.comment-row { display: flex; gap: 8px; margin-bottom: 8px; }
.comment-row.claude { flex-direction: row; }
.comment-row.user { flex-direction: row-reverse; }
.comment-avatar { width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid var(–border); background: var(–cream); }
.comment-bubble { padding: 8px 10px; font-size: 11px; line-height: 1.5; color: var(–text); max-width: 85%; }
.comment-bubble.claude { background: #fce4d6; border: 1px solid #f4c4a0; }
.comment-bubble.user { background: #e8ede4; border: 1px solid #c4d4b4; }
.comment-input { display: flex; gap: 6px; margin-top: 8px; }
.comment-input input { flex: 1; padding: 8px 10px; border: 2px solid var(–border); background: var(–cream); font-family: inherit; font-size: 11px; color: var(–text); outline: none; }
.comment-input button { padding: 6px 12px; border: 2px solid var(–border); background: var(–accent); color: var(–cream); cursor: pointer; font-size: 11px; font-family: inherit; box-shadow: 2px 2px 0 #7a7068; }

/* Filter */
.filter-bar { padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.filter-label { font-size: 10px; color: var(–muted); letter-spacing: 1px; margin-right: 2px; }
.filter-cat { position: relative; display: inline-block; }
.filter-cat-btn { padding: 4px 10px; font-size: 10px; border: 1px solid var(–shadow); background: transparent; color: #8a7a68; cursor: pointer; font-family: inherit; }
.filter-cat-btn.has-active { border-color: var(–accent); background: #fce4d6; color: var(–accent); }
.filter-cat-btn.open { background: var(–accent); color: var(–cream); }
.filter-dropdown { position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(–card); border: 2px solid var(–border); padding: 8px; box-shadow: 4px 4px 0 var(–shadow); z-index: 50; display: flex; flex-wrap: wrap; gap: 4px; min-width: 200px; }
.filter-tag { padding: 3px 8px; font-size: 10px; cursor: pointer; font-family: inherit; }
.clear-btn { padding: 4px 8px; font-size: 10px; border: 1px solid var(–accent); background: transparent; color: var(–accent); cursor: pointer; font-family: inherit; }

/* Exchange */
.exchange { max-width: 600px; margin: 0 auto; padding: 16px; }
.exchange-card { background: var(–card); border: 2px solid var(–border); padding: 20px; margin-bottom: 16px; box-shadow: 3px 3px 0 var(–light); }
.input { width: 100%; padding: 10px; border: 2px solid var(–border); background: var(–cream); font-family: inherit; font-size: 12px; color: var(–text); outline: none; margin-bottom: 8px; }
.input:focus { border-color: var(–accent); }
textarea.input { resize: vertical; min-height: 60px; }
.submit-btn { padding: 10px 24px; border: 2px solid var(–border); background: var(–accent); color: var(–cream); cursor: pointer; font-size: 12px; font-family: inherit; box-shadow: 3px 3px 0 #7a7068; }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }
.submit-btn:not(:disabled):hover { transform: translateY(-1px); }

/* History card */
.hist-card { padding: 12px; background: var(–card); border: 2px solid var(–light); margin-bottom: 8px; cursor: pointer; transition: all .2s; }
.hist-card:hover { border-color: var(–accent); box-shadow: 3px 3px 0 #fce4d6; }
.hist-meta { font-size: 10px; color: var(–muted); margin-bottom: 8px; text-align: center; }
.hist-theme { font-size: 11px; color: #7a7068; margin-bottom: 10px; font-style: italic; text-align: center; }
.hist-songs { display: flex; align-items: center; gap: 8px; }
.hist-side { flex: 1; display: flex; align-items: center; gap: 6px; }
.hist-side.right { justify-content: flex-end; }

/* Modals */
.overlay { position: fixed; inset: 0; background: rgba(90,83,76,.3); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: var(–card); border: 2px solid var(–border); padding: 24px; box-shadow: 6px 6px 0 var(–shadow); max-width: 340px; width: 90%; }
.modal-title { font-size: 14px; font-weight: 700; color: var(–text); margin-bottom: 20px; letter-spacing: 2px; }
.setting-row { margin-bottom: 16px; padding: 12px; background: var(–bg); border: 1px solid var(–light); }
.emoji-grid { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(–card); border: 2px solid var(–border); padding: 10px; box-shadow: 4px 4px 0 var(–shadow); z-index: 100; margin-top: 4px; display: grid; grid-template-columns: repeat(5,1fr); gap: 4px; width: 180px; }
.emoji-btn { width: 32px; height: 32px; border: 1px solid var(–light); background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.emoji-btn.active { border: 2px solid var(–accent); background: #fce4d6; }

/* Footer */
.footer { text-align: center; padding: 24px; font-size: 10px; color: #c4b4a0; letter-spacing: 2px; border-top: 1px dashed var(–light); }

/* Scroll to top */
.scroll-top { position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px; border: 2px solid var(–border); background: var(–card); color: var(–accent); cursor: pointer; font-size: 16px; font-family: inherit; box-shadow: 3px 3px 0 var(–shadow); display: flex; align-items: center; justify-content: center; z-index: 100; }

/* Loading */
.loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
@keyframes dots { 0%,20% { content: ‘’; } 40% { content: ‘.’; } 60% { content: ‘..’; } 80%,100% { content: ‘…’; } }
.dots::after { content: ‘’; animation: dots 1.5s infinite; }

/* Responsive */
.mobile-switcher { display: none; align-items: center; justify-content: center; gap: 16px; padding: 12px 16px; }
.mobile-switcher button { font-size: 10px; border: none; background: none; cursor: pointer; font-family: inherit; color: #c4b4a0; }
.mobile-switcher button.active { color: var(–accent); font-weight: 700; }
.switch-dots { display: flex; gap: 8px; }
.switch-dot { width: 8px; height: 8px; background: var(–shadow); border: 1px solid var(–border); cursor: pointer; }
.switch-dot.mid { width: 10px; height: 10px; }
.switch-dot.active { background: var(–accent); }

@media (max-width: 639px) {
.mobile-switcher { display: flex; }
.columns.hide-claude .col.claude-col,
.columns.hide-user .col.user-col,
.columns.hide-claude .divider,
.columns.hide-user .divider { display: none; }
}
.empty-state { text-align: center; padding: 60px 20px; color: #c4b4a0; }
.empty-state .icon { font-size: 28px; margin-bottom: 12px; }

.q-display { padding: 12px; background: #fce4d6; border: 1px solid #f4c4a0; margin-bottom: 16px; font-size: 13px; color: var(–text); line-height: 1.6; }
.hint { font-size: 10px; color: var(–muted); line-height: 1.6; margin-top: 8px; }
.tag-section { margin-bottom: 8px; }
.tag-section-label { font-size: 10px; letter-spacing: 1px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
</style>

</head>
